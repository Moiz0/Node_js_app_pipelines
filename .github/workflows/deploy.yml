name: Deploy Nodejs App to EC2 server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu@ip-172-31-42-10
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /ubuntu@ip-172-31-42-10/Node_js_app_pipelines
            git pull 
            docker compose up -d --build
